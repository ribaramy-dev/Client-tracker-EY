<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Training Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f0f0f0;font-family:'DM Mono',monospace;min-height:100vh;padding-bottom:80px}
.nav{background:#0d0d0d;border-bottom:1px solid #1a1a1a;position:sticky;top:0;z-index:100;padding:10px 14px 0}
.nav-inner{max-width:680px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:4px}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:#fff;cursor:pointer}
.nav-tabs{display:flex;gap:2px;flex-wrap:wrap}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 7px;border-radius:6px;color:#444;transition:all .15s}
.nav-btn.active{background:#1e1e1e;color:#f0f0f0}
.nav-btn.admin-btn{color:#B847FF44}
.nav-btn.admin-btn.active{background:#B847FF22;color:#B847FF}
.page{max-width:680px;margin:0 auto;padding:16px 14px 40px;display:none}
.page.active{display:block}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.06em}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.week-btn{background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#888;font-size:11px;padding:5px 12px;cursor:pointer;font-family:'DM Mono',monospace}
.pb-track{height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden;margin-bottom:14px}
.pb-fill{height:100%;border-radius:2px;transition:width .4s ease}
.day-tabs{display:flex;border-bottom:1px solid #1e1e1e;margin-bottom:16px;overflow-x:auto}
.day-tab{flex:1;min-width:52px;padding:8px 4px;text-align:center;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.day-tab .dt-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.06em}
.day-tab .dt-type{font-size:7px;letter-spacing:.05em;text-transform:uppercase;padding:2px 3px;border-radius:3px;margin-top:3px;font-weight:500}
.day-tab .dt-dot{width:5px;height:5px;border-radius:50%;margin:3px auto 0}
.day-tab .dt-date{font-size:8px;color:#444;margin-top:2px}
.sec-div{font-size:9px;color:#3a3a3a;letter-spacing:.14em;text-transform:uppercase;margin:14px 0 7px;padding-left:8px;border-left:2px solid #2a2a2a}
.ex-card{background:#161616;border:1px solid #222;border-radius:10px;padding:12px 14px;margin-bottom:9px;position:relative;overflow:hidden;transition:all .2s}
.ex-card.plyo{background:#1a1212;border-color:#2e1e1e}
.ex-card.abs{background:#121a14;border-color:#1e2e20}
.ex-card.skipped{opacity:.3;background:#111}
.ex-card.done{opacity:.4;background:#111}
.ex-card.editing{background:#1a1a1a!important}
.ex-card.dragging{opacity:.4;border-style:dashed}
.ex-card.drag-over{border-top:2px solid #888}
.ex-row-inner{display:flex;align-items:flex-start;gap:8px}
.drag-handle{font-size:14px;color:#333;cursor:grab;flex-shrink:0;margin-top:3px;padding:0 2px;user-select:none;touch-action:none}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid #444;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .2s;user-select:none}
.skip-btn{background:none;border:1px solid #2a2a2a;border-radius:4px;color:#3a3a3a;font-size:9px;padding:1px 6px;cursor:pointer;font-family:'DM Mono',monospace}
.skip-btn.active{background:#2a1a1a;border-color:#ff6b6b44;color:#ff6b6b88}
.ex-name{font-size:13px;font-weight:500;color:#e8e8e8}
.ex-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;align-items:center;margin-top:4px}
.pill-accent{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.pill-dark{font-size:10px;color:#888;background:#1e1e1e;padding:2px 7px;border-radius:4px;border:1px solid #2a2a2a}
.ex-note{font-size:11px;color:#666;line-height:1.5}
.tag-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.1em;margin-left:4px;vertical-align:middle}
.edit-btn{background:none;border:1px solid #2a2a2a;border-radius:5px;color:#444;font-size:10px;padding:2px 7px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.prog-banner{border-radius:7px;padding:8px 11px;margin-bottom:8px;font-size:10px;line-height:1.6;background:#E8FF4710;border:1px solid #E8FF4730}
.edit-form{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.edit-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:60px}
.edit-label{font-size:9px;color:#555;letter-spacing:.1em;text-transform:uppercase}
.edit-input{background:#0d0d0d;border:1px solid #555;border-radius:5px;color:#f0f0f0;font-size:11px;font-family:'DM Mono',monospace;padding:4px 7px;width:100%;outline:none}
.save-btn{border:none;border-radius:5px;color:#000;font-size:10px;padding:4px 10px;cursor:pointer;font-family:'DM Mono',monospace;font-weight:600}
.cancel-btn{background:none;border:1px solid #333;border-radius:5px;color:#555;font-size:10px;padding:4px 10px;cursor:pointer;font-family:'DM Mono',monospace}
.complete-banner{margin-top:18px;padding:14px 18px;border-radius:10px;text-align:center}
.fin-card{border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden;transition:all .2s}
.cable-card{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden}
.mob-block{margin-bottom:10px}
.mob-header{background:#141414;border-radius:10px;padding:12px 14px;cursor:pointer;position:relative;overflow:hidden}
.mob-header.open{border-radius:10px 10px 0 0}
.mob-body{border-top:none;border-radius:0 0 10px 10px;background:#0f0f0f;padding:4px 12px 10px;display:none}
.mob-body.open{display:block}
.mob-ex{display:flex;gap:10px;align-items:flex-start;padding:10px 4px;cursor:pointer}
.hist-card{background:#141414;border:1px solid #222;border-radius:10px;padding:13px 14px;margin-bottom:10px}
.hist-day-grid{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.hist-day-tile{flex:1;min-width:48px;border-radius:6px;padding:6px 3px;text-align:center;cursor:pointer;border:1px solid #222}
.hist-drill{background:#0f0f0f;border-radius:8px;padding:9px 11px;margin-top:5px;display:none}
.hist-drill.open{display:block}
.hist-ex-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;padding:6px 0;border-bottom:1px solid #1a1a1a;flex-wrap:wrap}
.hist-ex-row:last-child{border-bottom:none}
.prog-entry{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.prog-bar-wrap{flex:1;background:#161616;border:1px solid #1e1e1e;border-radius:8px;padding:9px 13px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:24px}
.stat-card{background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:13px 14px}
select.sel-input{background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#ccc;font-size:11px;font-family:'DM Mono',monospace;padding:6px 10px;outline:none;width:100%;cursor:pointer;margin-bottom:16px}
/* ADMIN */
.admin-section{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:14px}
.admin-section-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.06em;color:#B847FF;margin-bottom:12px}
.admin-input{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;color:#f0f0f0;font-size:11px;font-family:'DM Mono',monospace;padding:6px 10px;width:100%;outline:none;margin-bottom:8px}
.admin-input:focus{border-color:#B847FF}
.admin-btn-primary{background:#B847FF;border:none;border-radius:6px;color:#fff;font-size:11px;padding:7px 14px;cursor:pointer;font-family:'DM Mono',monospace;font-weight:600;letter-spacing:.06em}
.admin-btn-secondary{background:none;border:1px solid #2a2a2a;border-radius:6px;color:#888;font-size:11px;padding:7px 14px;cursor:pointer;font-family:'DM Mono',monospace}
.admin-btn-danger{background:none;border:1px solid #ff6b6b44;border-radius:6px;color:#ff6b6b88;font-size:10px;padding:4px 10px;cursor:pointer;font-family:'DM Mono',monospace}
.admin-btn-small{background:#B847FF22;border:1px solid #B847FF44;border-radius:5px;color:#B847FF;font-size:10px;padding:3px 9px;cursor:pointer;font-family:'DM Mono',monospace}
.day-admin-card{background:#0f0f0f;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:10px}
.ex-admin-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #1a1a1a;flex-wrap:wrap}
.ex-admin-row:last-child{border-bottom:none}
.color-swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0;display:inline-block;vertical-align:middle}
.pin-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px}
.pin-input{background:#161616;border:1px solid #2a2a2a;border-radius:8px;color:#f0f0f0;font-size:24px;font-family:'DM Mono',monospace;padding:10px 16px;width:140px;text-align:center;outline:none;letter-spacing:.3em}
.pin-input:focus{border-color:#B847FF}
textarea.admin-input{min-height:60px;resize:vertical}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pin-screen">
  <div class="bebas" style="font-size:28px;color:#B847FF">ADMIN ACCESS</div>
  <div style="font-size:11px;color:#555">Enter 4-digit PIN</div>
  <input class="pin-input" type="password" maxlength="4" inputmode="numeric" id="pin-input" oninput="checkPin(this.value)" placeholder="••••">
  <div id="pin-error" style="font-size:10px;color:#ff6b6b;min-height:16px"></div>
</div>

<div class="nav" id="main-nav" style="display:none">
  <div class="nav-inner">
    <div class="nav-title" onclick="showPage('workout')" title="Training Tracker">TRAINING TRACKER</div>
    <div class="nav-tabs">
      <button class="nav-btn active" onclick="showPage('workout')">🏋️ workout</button>
      <button class="nav-btn" onclick="showPage('mobility')">🧘 mobility</button>
      <button class="nav-btn" onclick="showPage('history')">📅 history</button>
      <button class="nav-btn" onclick="showPage('progress')">📈 progress</button>
      <button class="nav-btn admin-btn" onclick="showPage('admin')">⚙️ admin</button>
    </div>
  </div>
</div>

<div id="page-workout" class="page active" style="display:none"></div>
<div id="page-mobility" class="page" style="display:none"></div>
<div id="page-history" class="page" style="display:none"></div>
<div id="page-progress" class="page" style="display:none"></div>
<div id="page-admin" class="page" style="display:none"></div>

const MOBILITY_DEFAULTS = DEFAULT_TEMPLATE.mobilityBlocks;

// ─────────────────────────────────────────────
// WEEK UTILITIES — weeks start Sunday
// ─────────────────────────────────────────────
function getSundayKey(offset=0){
  const now=new Date(),dow=now.getDay(),sun=new Date(now);
  sun.setDate(now.getDate()-dow+offset*7);sun.setHours(0,0,0,0);
  return sun.toISOString().split('T')[0];
}
function getDayDate(sk,label){
  const off={MON:1,TUE:2,WED:3,THU:4,FRI:5,SAT:6,SUN:7};
  const d=new Date(sk);d.setDate(d.getDate()+(off[label]||1));return d;
}
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDT(iso){const d=new Date(iso);return fmt(d)+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function weekLabel(sk){const s=new Date(sk),e=new Date(s);e.setDate(s.getDate()+6);return `${fmt(s)} – ${fmt(e)}`;}

// ─────────────────────────────────────────────
// PROGRESSION
// ─────────────────────────────────────────────
function isBW(load){return (load||'').toLowerCase().includes('bodyweight');}
function isMachine(name){return ['machine','pulldown','extension','hip thrust'].some(m=>name.toLowerCase().includes(m));}
function suggestInc(name){return isMachine(name)?'5–10 lb':'5 lb';}

function getMostRecentLogged(exName){
  const weeks=Object.keys(S.allWeeks).sort().reverse();
  for(const wk of weeks){
    const wd=S.allWeeks[wk];
    for(let di=0;di<(wd.days||[]).length;di++){
      const ex=(wd.days[di].exercises||[]).find(e=>e.name===exName);
      if(!ex) continue;
      const anyDone=(wd.days[di].exercises||[]).some((_,ei)=>(wd.logged||{})[`${di}-${ei}`]);
      if(anyDone) return {wk,ex};
    }
  }
  return null;
}

function getProgFlag(exName,curEx){
  if(isBW(curEx.load)) return null;
  const weeks=Object.keys(S.allWeeks).sort().reverse();
  const entries=[];
  for(const wk of weeks){
    const wd=S.allWeeks[wk];
    for(let di=0;di<(wd.days||[]).length;di++){
      const ex=(wd.days[di].exercises||[]).find(e=>e.name===exName);
      if(!ex) continue;
      const anyDone=(wd.days[di].exercises||[]).some((_,ei)=>(wd.logged||{})[`${di}-${ei}`]);
      if(anyDone){entries.push({wk,ex});break;}
    }
    if(entries.length>=2) break;
  }
  if(entries.length<2) return null;
  const last=entries[0],prev=entries[1];
  const lastR=parseInt(last.ex.reps)||0,prevR=parseInt(prev.ex.reps)||0;
  const targetR=parseInt(curEx.reps)||0;
  if(lastR>=targetR&&prevR>=targetR){
    return {lastLoad:last.ex.load,lastReps:last.ex.reps,lastSets:last.ex.sets,suggestion:suggestInc(exName)};
  }
  return null;
}

// ─────────────────────────────────────────────

  allWeeks:{},

  adminSubview:'days', // days | mobility | settings
  adminEditDay:null,
  adminEditEx:null,
  adminEditFinEx:null,
  adminEditCfEx:null,
  adminEditMobBlock:null,
  adminEditMobEx:null,
};
const STORAGE_KEY='tt-custom-v1';
const TEMPLATE_KEY='tt-template-v1';

function loadStorage(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);if(s)S.allWeeks=JSON.parse(s);
    const t=localStorage.getItem(TEMPLATE_KEY);
    S.template=t?JSON.parse(t):JSON.parse(JSON.stringify(DEFAULT_TEMPLATE));
  }catch(e){S.template=JSON.parse(JSON.stringify(DEFAULT_TEMPLATE));}
}
function saveStorage(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S.allWeeks));}catch(e){}
}
function saveTemplate(){
  try{localStorage.setItem(TEMPLATE_KEY,JSON.stringify(S.template));}catch(e){}
}

function buildWeek(sk){
  const tmpl=S.template;
  return {
    sunKey:sk,
    days:tmpl.days.map(pd=>({
      ...pd,
      exercises:pd.exercises.map(ex=>{
        const recent=getMostRecentLogged(ex.name);
        if(recent&&recent.ex.load) return {...ex,load:recent.ex.load,reps:recent.ex.reps,sets:recent.ex.sets,
          setWeights:recent.ex.setWeights?[...recent.ex.setWeights]:undefined,
          setReps:recent.ex.setReps?[...recent.ex.setReps]:undefined};
        return {...ex};
      }),
    })),
    order:tmpl.days.map(pd=>pd.exercises.map((_,i)=>i)),
    skipped:{},logged:{},finisherLogged:{},
    finishers:tmpl.days.map(pd=>{
      const fins=(tmpl.finishersByDay||{})[pd.label]||[];
      return {exercises:fins.map(e=>({...e}))};
    }),
  };
}

function ensureWeek(sk){
  if(!S.allWeeks[sk]){S.allWeeks[sk]=buildWeek(sk);saveStorage();}
}
function getWD(sk){ensureWeek(sk);return S.allWeeks[sk];}
function curSK(){return getSundayKey(S.weekOffset);}

function checkPin(val){
  if(val.length<4) return;
  if(val===ADMIN_PIN){
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('main-nav').style.display='';
    document.querySelectorAll('.page').forEach(p=>{p.style.display='';});
    renderPage();
  } else {
    document.getElementById('pin-error').textContent='Incorrect PIN';
    document.getElementById('pin-input').value='';
    setTimeout(()=>document.getElementById('pin-error').textContent='',2000);
  }
}

const TAG_COLORS={PLYO:{bg:'#ff6b6b22',color:'#ff6b6b'},ABS:{bg:'#47ff9922',color:'#47ff99'},GRIP:{bg:'#ffb84722',color:'#ffb847'}};

function progBannerHTML(flag){
  if(!flag) return '';
  return `<div class="prog-banner">
    <div style="color:#E8FF47;font-weight:600;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px">📈 READY TO PROGRESS</div>
    <div style="color:#E8FF47;font-size:10px">Recent: ${flag.lastSets}×${flag.lastReps} @ ${flag.lastLoad}</div>
    <div style="color:#aaa;font-size:10px;margin-top:1px">Consider +${flag.suggestion}</div>
  </div>`;
}

function renderSetRows(ex,isEdit,bw){
  if(!isEdit){
    if((!ex.setWeights||ex.setWeights.length<=1)&&(!ex.setReps||ex.setReps.length<=1)) return '';
    const n=parseInt(ex.sets)||3;
    return `<div style="margin-top:3px;display:flex;flex-wrap:wrap">${Array(n).fill(0).map((_,i)=>`<span style="font-size:9px;color:#3a3a3a;margin-right:10px">S${i+1}: ${(ex.setReps||[])[i]||ex.reps}r${!bw?' @ '+((ex.setWeights||[])[i]||ex.load):''}</span>`).join('')}</div>`;
  }
  const sw=S.editValues.setWeights||[],sr=S.editValues.setReps||[];
  return `<div style="margin-top:4px"><div class="edit-label" style="margin-bottom:6px">Per set${!bw?' — reps + weight':' — reps'}</div>
    ${sw.map((w,i)=>`<div style="display:flex;gap:5px;align-items:flex-end;margin-bottom:6px">
      <div style="width:32px;font-size:9px;color:#3a3a3a;padding-bottom:5px;flex-shrink:0">S${i+1}</div>
      <div class="edit-field"><input class="edit-input" value="${sr[i]||''}" placeholder="reps" onchange="S.editValues.setReps[${i}]=this.value"></div>
      ${!bw?`<div class="edit-field"><input class="edit-input" value="${w||''}" placeholder="e.g. 40 lb" onchange="S.editValues.setWeights[${i}]=this.value"></div>`:''}
    </div>`).join('')}
  </div>`;
}

function renderExCard(ex,key,dayColor,isDone,isSkipped,isFinisher,dragIdx){
  const isEditing=S.editingKey===key;
  const bw=isBW(ex.load);
  const tag=ex.exTag;
  const tc=tag&&TAG_COLORS[tag];
  const rowCls=tag==='PLYO'?'plyo':tag==='ABS'?'abs':'';
  const checkFn=key.startsWith('f-')?`toggleFinisher('${key}')`:`toggleCheck('${key}')`;
  const checkStyle=isDone?`border-color:${dayColor};background:${dayColor};color:#000`:'border-color:#444';
  const flag=(!isFinisher&&!bw&&!isSkipped)?getProgFlag(ex.name,ex):null;

  let inner='';
  if(isEditing){
    inner=`${flag?progBannerHTML(flag):''}
    <div class="edit-form">
      <div style="display:flex;gap:7px">
        <div class="edit-field" style="max-width:65px">
          <div class="edit-label">Sets</div>
          <input class="edit-input" type="number" min="1" max="10" value="${S.editValues.sets}" oninput="updateEditSets(this.value)">
        </div>
      </div>
      ${renderSetRows(ex,true,bw)}
      <div style="display:flex;gap:7px">
        <button class="save-btn" style="background:${dayColor}" onclick="saveEdit('${key}')">SAVE</button>
        <button class="cancel-btn" onclick="cancelEdit()">CANCEL</button>
      </div>
    </div>`;
  } else {
    inner=`${flag?progBannerHTML(flag):''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;flex-wrap:wrap">
      <div>
        <span class="ex-name" style="color:${(isDone||isSkipped)?'#555':'#e8e8e8'}">${ex.name}</span>
        ${tc?`<span class="tag-pill" style="background:${tc.bg};color:${tc.color}">${tag}</span>`:''}
        ${isSkipped?'<span style="font-size:9px;color:#ff6b6b88;margin-left:6px">SKIPPED</span>':''}
      </div>
      <div style="display:flex;gap:5px;align-items:center">
        <button class="skip-btn${isSkipped?' active':''}" onclick="toggleSkip('${key}')">${isSkipped?'UNDO':'SKIP'}</button>
        <button class="edit-btn" onclick="startEdit(event,'${key}')">EDIT</button>
      </div>
    </div>
    <div class="ex-meta">
      <span class="pill-accent" style="color:${dayColor};background:${dayColor}18">${ex.sets}×${ex.reps}</span>
      ${!bw&&ex.load?`<span class="pill-dark">${ex.load}</span>`:''}
    </div>
    ${renderSetRows(ex,false,bw)}
    <div class="ex-note" style="color:${(isDone||isSkipped)?'#333':'#666'}">${ex.note||''}</div>`;
  }

  const drgAttr=!isFinisher&&dragIdx>=0?`draggable="true" ondragstart="dragStart(event,${dragIdx})" ondragover="dragOver(event,${dragIdx})" ondrop="dragDrop(event,${dragIdx})" ondragend="dragEnd()"`:'' ;
  return `<div class="ex-card ${rowCls}${isDone?' done':''}${isSkipped?' skipped':''}${isEditing?' editing':''}" ${drgAttr} id="excard-${key}">
    <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${tag==='PLYO'?'#ff6b6b':tag==='ABS'?'#47ff99':dayColor};opacity:${tag?0.6:0.4}"></div>
    <div class="ex-row-inner">
      ${!isFinisher&&dragIdx>=0?`<div class="drag-handle">⠿</div>`:''}
      <div class="check-circle" style="${checkStyle}" onclick="${checkFn}">${isDone?'✓':''}</div>
      <div style="flex:1;min-width:0">${inner}</div>
    </div>
  </div>`;
}

function renderWorkout(){
  const sk=curSK(),wd=getWD(sk),di=S.activeDay,day=wd.days[di];
  if(!day){document.getElementById('page-workout').innerHTML='<div style="color:#555;text-align:center;margin-top:60px;font-size:12px">No days configured.<br>Set up your program in the Admin tab.</div>';return;}
  const logged=wd.logged||{},skipped=wd.skipped||{};
  const order=(wd.order&&wd.order[di])||day.exercises.map((_,i)=>i);
  function isLogged(k){return !!logged[k];}
  function isSkip(k){return !!skipped[k];}
  const activeKeys=order.map(ei=>`${di}-${ei}`).filter(k=>!isSkip(k));
  const doneCount=activeKeys.filter(k=>isLogged(k)).length;
  const totalCount=activeKeys.length;
  const weekDone=wd.days.filter((d,dIdx)=>{
    const ord=(wd.order&&wd.order[dIdx])||d.exercises.map((_,i)=>i);
    const act=ord.map(ei=>`${dIdx}-${ei}`).filter(k=>!(wd.skipped||{})[k]);
    return act.length>0&&act.every(k=>(wd.logged||{})[k]);
  }).length;
  const totalDays=wd.days.length;
  const isCurWk=S.weekOffset===0;
  const tmpl=S.template;

  let html=`<div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">← prev</button>
    <div style="text-align:center">
      <div class="bebas" style="font-size:14px;color:${isCurWk?(tmpl.accentColor||'#E8FF47'):'#ccc'}">${isCurWk?'THIS WEEK':''}</div>
      <div style="font-size:11px;color:#888">${weekLabel(sk)}</div>
    </div>
    <button class="week-btn" onclick="changeWeek(1)" style="opacity:${S.weekOffset===0?0.2:1}">next →</button>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:9px;color:#3a3a3a;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em">
    <span>week progress</span><span>${weekDone}/${totalDays} sessions</span>
  </div>
  <div class="pb-track"><div class="pb-fill" style="width:${(weekDone/totalDays)*100}%;background:${tmpl.accentColor||'#E8FF47'}"></div></div>`;

  html+=`<div class="day-tabs">`;
  wd.days.forEach((d,i)=>{
    const ord=(wd.order&&wd.order[i])||d.exercises.map((_,idx)=>idx);
    const act=ord.map(ei=>`${i}-${ei}`).filter(k=>!(wd.skipped||{})[k]);
    const done=act.length>0&&act.every(k=>(wd.logged||{})[k]);
    const isAct=i===S.activeDay;
    html+=`<div class="day-tab" style="border-bottom-color:${isAct?d.color:'transparent'};color:${isAct?d.color:'#555'}" onclick="setDay(${i})">
      <div class="dt-label">${d.label}</div>
      <div class="dt-type" style="background:${isAct?d.color:'transparent'};color:${isAct?d.textColor:'#555'}">${d.type}</div>
      <div class="dt-date">${fmt(getDayDate(sk,d.label))}</div>
      ${done?`<div class="dt-dot" style="background:${d.color}"></div>`:''}
    </div>`;
  });
  html+=`</div>`;

  html+=`<div style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap">
      <div class="bebas" style="font-size:22px;color:${day.color}">${day.focus}</div>
      <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${day.color}22;color:${day.color};border:1px solid ${day.color}44">${day.type}</span>
      <span style="font-size:11px;color:#444;margin-left:auto">${doneCount}/${totalCount}</span>
    </div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:#1e1e1e;border:1px solid #2a2a2a;font-size:11px;color:#888">
      <div style="width:6px;height:6px;border-radius:50%;background:${day.color}"></div>${day.tag||''}
    </div>
  </div>
  <div style="font-size:10px;color:#2a2a2a;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Tap ✓ to log · EDIT to adjust · SKIP to exclude · drag ⠿ to reorder</div>`;

  const sections=[
    {label:'Power',filter:ex=>ex.exTag==='PLYO'},
    {label:'Strength',filter:ex=>!ex.exTag||ex.exTag==='GRIP'},
    {label:'Core',filter:ex=>ex.exTag==='ABS'},
  ];
  sections.forEach(sec=>{
    const items=order.map(ei=>({ex:day.exercises[ei],ei})).filter(({ex})=>ex&&sec.filter(ex));
    if(!items.length) return;
    html+=`<div class="sec-div">${sec.label}</div>`;
    items.forEach(({ex,ei})=>{
      const key=`${di}-${ei}`;
      html+=renderExCard(ex,key,day.color,isLogged(key),isSkip(key),false,ei);
    });
  });

  if(doneCount===totalCount&&totalCount>0){
    html+=`<div class="complete-banner" style="background:${day.color}12;border:1px solid ${day.color}33">
      <div class="bebas" style="font-size:20px;color:${day.color}">SESSION COMPLETE</div>
      <div style="font-size:11px;color:#555;margin-top:3px">REST · RECOVER · COME BACK STRONGER</div>

  if(weekDone===totalDays){
    html+=`<div class="complete-banner" style="background:#1a1a0a;border:1px solid ${tmpl.accentColor||'#E8FF47'}33;margin-top:10px">
      <div class="bebas" style="font-size:18px;color:${tmpl.accentColor||'#E8FF47'}">🏆 FULL WEEK COMPLETE</div>
    </div>`;

  // Finishers
  const finData=(wd.finishers||[])[di];
  if(finData&&finData.exercises.length){
    html+=`<div style="margin-top:24px">

    finData.exercises.forEach((ex,fi)=>{
      const key=`f-${di}-${fi}`;
      const done=!!(wd.finisherLogged||{})[key];
      html+=`<div class="fin-card" style="background:${done?'#111':'#131313'};border:1px solid ${done?day.color+'44':day.color+'22'};opacity:${done?0.55:1}">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${day.color};opacity:${done?1:0.5}"></div>
        ${renderExCard(ex,key,day.color,done,false,true,-1)}
      </div>`;
    });
    html+=`</div>`;
  }

  // Cable-free
  const cf=((tmpl.cableFreeByDay||{})[day.label])||[];
  if(cf.length){
    html+=`<div style="margin-top:24px">
      <div class="bebas" style="font-size:16px;color:#888;margin-bottom:5px">NO CABLE? USE THESE</div>
      <div style="font-size:10px;color:#3a3a3a;margin-bottom:10px">DB alternatives for cable exercises today</div>`;
    cf.forEach(c=>{
      html+=`<div class="cable-card">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#444"></div>
        <div style="font-size:9px;color:#3a3a3a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">REPLACES: ${c.original}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          <div style="font-size:13px;font-weight:500;color:#bbb">${c.alt}</div>
          <div style="display:flex;gap:5px"><span class="pill-dark">${c.sets}×${c.reps}</span>${c.load?`<span class="pill-dark">${c.load}</span>`:''}</div>
        </div>
        <div style="font-size:11px;color:#444;line-height:1.5">${c.note}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('page-workout').innerHTML=html;
}

function renderHistory(){
  let html=`<div class="bebas" style="font-size:26px;color:#fff;margin-bottom:3px">SESSION HISTORY</div>
  <div style="font-size:11px;color:#444;margin-bottom:18px">Tap a day tile to see logged detail</div>`;
  const weeks=Object.keys(S.allWeeks).sort().reverse();
  if(!weeks.length) html+=`<div style="color:#333;font-size:12px;text-align:center;margin-top:60px">No sessions logged yet.</div>`;
  weeks.forEach(sk=>{
    const wd=S.allWeeks[sk];
    const logged=wd.logged||{},skipped=wd.skipped||{};
    const totalDays=wd.days.length;
    const sessComplete=wd.days.filter((d,di)=>{
      const ord=(wd.order&&wd.order[di])||d.exercises.map((_,i)=>i);
      const act=ord.map(ei=>`${di}-${ei}`).filter(k=>!skipped[k]);
      return act.length>0&&act.every(k=>logged[k]);
    }).length;
    const totalDone=Object.keys(logged).filter(k=>!k.startsWith('f-')).length;
    const totalEx=wd.days.reduce((s,d)=>s+d.exercises.length,0);
    const activeDates=[...new Set(Object.entries(logged).filter(([k])=>!k.startsWith('f-')).map(([,iso])=>new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})))];
    html+=`<div class="hist-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div class="bebas" style="font-size:17px;color:#fff">${weekLabel(sk)}</div>
          <div style="font-size:9px;color:#3a3a3a;margin-top:2px">${activeDates.slice(0,4).join(' · ')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:${sessComplete===totalDays?'#E8FF47':'#888'};font-weight:500">${sessComplete}/${totalDays} sessions</div>
          <div style="font-size:10px;color:#3a3a3a">${totalDone}/${totalEx} exercises</div>
        </div>
      </div>
      <div class="hist-day-grid">`;
    wd.days.forEach((d,di)=>{
      const ord=(wd.order&&wd.order[di])||d.exercises.map((_,i)=>i);
      const act=ord.map(ei=>`${di}-${ei}`).filter(k=>!skipped[k]);
      const done=act.length>0&&act.every(k=>logged[k]);
      const partial=!done&&act.some(k=>logged[k]);
      const hk=`h-${sk}-${di}`;
      html+=`<div class="hist-day-tile" style="background:${done?d.color+'33':partial?'#1e1e14':'#1a1a1a'};border-color:${done?d.color+'55':partial?'#3a3a22':'#222'}" onclick="toggleHist('${hk}')">

function renderProgress(){
  const names=[...new Set((S.template.days||[]).flatMap(d=>d.exercises.map(e=>e.name)))];
  if(!names.length){document.getElementById('page-progress').innerHTML='<div style="color:#555;text-align:center;margin-top:60px;font-size:12px">No exercises configured yet.</div>';return;}
  if(!S.selectedEx||!names.includes(S.selectedEx)) S.selectedEx=names[0];
  const sel=S.selectedEx;
  const opts=names.map(n=>`<option value="${n}"${n===sel?'selected':''}>${n}</option>`).join('');
  let html=`<div class="bebas" style="font-size:26px;color:#fff;margin-bottom:3px">EXERCISE PROGRESS</div>
  <div style="font-size:11px;color:#444;margin-bottom:14px">Load tracking + progression recommendations</div>
  <select class="sel-input" onchange="S.selectedEx=this.value;renderProgress()">${opts}</select>`;
  const data=[];
  Object.keys(S.allWeeks).sort().forEach(sk=>{
    const wd=S.allWeeks[sk];
    wd.days.forEach((d,di)=>{
      const ex=d.exercises.find(e=>e.name===sel);
      if(!ex) return;
      const anyDone=d.exercises.some((_,ei)=>(wd.logged||{})[`${di}-${ei}`]);
      if(anyDone) data.push({sk,ex,label:d.label});
    });
  });
  if(data.length>=2){
    const last=data[data.length-1],prev=data[data.length-2];
    if(!isBW(last.ex.load)&&parseInt(last.ex.reps)>=parseInt(last.ex.reps)&&parseInt(prev.ex.reps)>=parseInt(prev.ex.reps)){
      html+=`<div style="padding:11px 14px;border-radius:9px;margin-bottom:14px;background:#E8FF4710;border:1px solid #E8FF4733">
        <div style="font-size:9px;color:#E8FF47;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">📈 TRAINER RECOMMENDATION</div>
        <div style="font-size:11px;color:#E8FF47">Rep target hit — consider +${suggestInc(sel)}</div>
        <div style="font-size:10px;color:#888;margin-top:3px">${prev.ex.sets}×${prev.ex.reps} @ ${prev.ex.load} → ${last.ex.sets}×${last.ex.reps} @ ${last.ex.load}</div>
      </div>`;
    }
  }
  if(!data.length){html+=`<div style="color:#333;font-size:12px;text-align:center;margin-top:40px">No data yet. Log a session to start tracking.</div>`;}
  else{
    data.forEach((entry,i)=>{
      const isLatest=i===data.length-1,bw=isBW(entry.ex.load);
      html+=`<div class="prog-entry">
        <div style="width:74px;font-size:10px;color:#555;flex-shrink:0">${fmt(getDayDate(entry.sk,entry.label))}</div>
        <div class="prog-bar-wrap" style="border-color:${isLatest?'#E8FF4755':'#1e1e1e'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;color:${isLatest?'#E8FF47':'#ccc'};font-weight:500">${bw?'Bodyweight':entry.ex.load||'—'}</span>
            <span style="font-size:10px;color:#555">${entry.ex.sets}×${entry.ex.reps}</span>
          </div>
        </div>
        ${isLatest?`<div style="font-size:10px;color:#E8FF47;flex-shrink:0">← now</div>`:''}
      </div>`;
    });
  }
  const wks=Object.keys(S.allWeeks);
  if(wks.length){
    const totalSess=Object.values(S.allWeeks).reduce((s,wd)=>s+wd.days.filter((d,di)=>{const ord=(wd.order&&wd.order[di])||d.exercises.map((_,i)=>i);const act=ord.map(ei=>`${di}-${ei}`).filter(k=>!(wd.skipped||{})[k]);return act.length>0&&act.every(k=>(wd.logged||{})[k]);}).length,0);
    const totalEx=Object.values(S.allWeeks).reduce((s,wd)=>s+Object.keys(wd.logged||{}).filter(k=>!k.startsWith('f-')).length,0);
    html+=`<div class="bebas" style="font-size:17px;color:#fff;margin:26px 0 10px">OVERALL STATS</div>
    <div class="stat-grid">
      ${[['Weeks Logged',wks.length],['Total Sessions',totalSess],['Exercises Logged',totalEx]].map(([l,v])=>`
      <div class="stat-card"><div class="bebas" style="font-size:26px;color:#E8FF47">${v}</div><div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.08em">${l}</div></div>`).join('')}
    </div>`;
  }
  document.getElementById('page-progress').innerHTML=html;
}

    html+=`<button class="admin-btn-small" style="margin-top:6px" onclick="addMobEx(${bi})">+ ADD EXERCISE</button>`;

  });
  html+=`<button class="admin-btn-primary" style="margin-top:6px" onclick="addMobBlock()">+ ADD MOBILITY BLOCK</button>`;
  html+=`</div>`;
  return html;
}

// ─────────────────────────────────────────────
// WORKOUT ACTIONS
// ─────────────────────────────────────────────
function showPage(v){
  S.view=v;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{if(b.textContent.includes(v))b.classList.add('active');});
  renderPage();
}
function renderPage(){
  if(S.view==='workout') renderWorkout();
  else if(S.view==='mobility') renderMobility();
  else if(S.view==='history') renderHistory();
  else if(S.view==='progress') renderProgress();
  else if(S.view==='admin') renderAdmin();
}
function changeWeek(dir){if(dir===1&&S.weekOffset===0)return;S.weekOffset+=dir;S.editingKey=null;renderWorkout();}
function setDay(i){S.activeDay=i;S.editingKey=null;renderWorkout();}

function toggleCheck(key){
  if(S.editingKey) return;
  const sk=curSK();ensureWeek(sk);const wd=S.allWeeks[sk];
  if(!wd.logged) wd.logged={};
  if(wd.logged[key]) delete wd.logged[key];
  else wd.logged[key]=new Date().toISOString();
  saveStorage();renderWorkout();
}
function toggleFinisher(key){
  if(S.editingKey) return;
  const sk=curSK();ensureWeek(sk);const wd=S.allWeeks[sk];
  if(!wd.finisherLogged) wd.finisherLogged={};
  if(wd.finisherLogged[key]) delete wd.finisherLogged[key];
  else wd.finisherLogged[key]=new Date().toISOString();
  saveStorage();renderWorkout();
}
function toggleSkip(key){
  if(S.editingKey) return;
  const sk=curSK();ensureWeek(sk);const wd=S.allWeeks[sk];
  if(!wd.skipped) wd.skipped={};
  if(wd.skipped[key]) delete wd.skipped[key];
  else{wd.skipped[key]=true;if(wd.logged&&wd.logged[key]) delete wd.logged[key];}
  saveStorage();renderWorkout();
}
function startEdit(e,key){
  e.stopPropagation();
  const sk=curSK(),wd=getWD(sk);let ex;
  if(key.startsWith('f-')){const[,di,fi]=key.split('-').map(Number);ex=(wd.finishers||[])[di]?.exercises[fi];}
  else{const[di,ei]=key.split('-').map(Number);ex=wd.days[di].exercises[ei];}
  if(!ex) return;
  const n=parseInt(ex.sets)||3;
  const sw=ex.setWeights&&ex.setWeights.length===n?[...ex.setWeights]:Array(n).fill(ex.load||'');
  const sr=ex.setReps&&ex.setReps.length===n?[...ex.setReps]:Array(n).fill(ex.reps||'');
  S.editingKey=key;S.editValues={sets:ex.sets,reps:ex.reps,load:ex.load||'',setWeights:sw,setReps:sr};
  renderWorkout();
}
function updateEditSets(val){
  const n=Math.max(1,Math.min(10,parseInt(val)||1));
  const cw=S.editValues.setWeights||[],cr=S.editValues.setReps||[];
  S.editValues.sets=String(n);
  S.editValues.setWeights=Array(n).fill(null).map((_,i)=>cw[i]!==undefined?cw[i]:(cw[cw.length-1]||S.editValues.load||''));
  S.editValues.setReps=Array(n).fill(null).map((_,i)=>cr[i]!==undefined?cr[i]:(cr[cr.length-1]||S.editValues.reps||''));
  renderWorkout();
}
function saveEdit(key){
  const sk=curSK();ensureWeek(sk);const wd=S.allWeeks[sk];
  const sw=S.editValues.setWeights||[],sr=S.editValues.setReps||[];
  const uw=[...new Set(sw.filter(Boolean))],ur=[...new Set(sr.filter(Boolean))];
  const displayLoad=uw.length===1?uw[0]:uw.length>1?uw.join(' / '):S.editValues.load;
  const displayReps=ur.length===1?ur[0]:ur.length>1?ur.join(' / '):S.editValues.reps;
  const updated={reps:displayReps,sets:S.editValues.sets,load:displayLoad,
    setWeights:sw.length>1?sw:undefined,setReps:sr.length>1?sr:undefined};
  if(key.startsWith('f-')){
    const[,di,fi]=key.split('-').map(Number);
    if(wd.finishers&&wd.finishers[di]) Object.assign(wd.finishers[di].exercises[fi],updated);
  } else {
    const[di,ei]=key.split('-').map(Number);
    Object.assign(wd.days[di].exercises[ei],updated);
  }
  S.editingKey=null;saveStorage();renderWorkout();
}
function cancelEdit(){S.editingKey=null;renderWorkout();}

// Drag
function dragStart(e,ei){S.dragSrc=ei;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(ei));}
function dragOver(e,ei){e.preventDefault();e.dataTransfer.dropEffect='move';}
function dragDrop(e,tgt){
  e.preventDefault();
  if(S.dragSrc===null||S.dragSrc===tgt) return;
  const sk=curSK();ensureWeek(sk);const wd=S.allWeeks[sk],di=S.activeDay;
  if(!wd.order) wd.order=S.template.days.map(pd=>pd.exercises.map((_,i)=>i));
  const ord=[...(wd.order[di]||[])];
  const si=ord.indexOf(S.dragSrc),ti=ord.indexOf(tgt);
  if(si===-1||ti===-1) return;
  ord.splice(si,1);ord.splice(ti,0,S.dragSrc);
  wd.order[di]=ord;saveStorage();S.dragSrc=null;renderWorkout();
}
function dragEnd(){S.dragSrc=null;}

function toggleMob(id){S.mobOpen[id]=!S.mobOpen[id];renderMobility();}
function toggleMobEx(bid,ei){const k=`${bid}-${ei}`;S.mobChecked[k]=!S.mobChecked[k];renderMobility();}
function toggleHist(key){S.histOpen[key]=!S.histOpen[key];renderHistory();}

function autoGenWeeks(){for(let i=0;i<=4;i++) ensureWeek(getSundayKey(i));}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadStorage();
autoGenWeeks();
// Show pin screen — pages hidden until unlocked
</script>
